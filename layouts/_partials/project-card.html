<a {{ if .Param "link" }} href='{{ .Param "link" }}' {{ end }} class="project-card">
    {{ with resources.Get (.Param "image") }}
        <img src="{{ .Permalink }}" />
    {{ end }}
    <div class="project-card-content">
        <h3>{{ .Title }}</h3>
        <p>{{ .Description }}</p>
    </div>
</a>
